<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard · ImmersivePoint</title>

<!-- Shared theme -->
<link rel="stylesheet" href="/shared/theme.css" />

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  /* ===== Dashboard-specific styles ===== */

  /* Welcome banner */
  .welcome-banner {
    position: relative;
    background: linear-gradient(135deg, var(--surface-2), var(--surface-3));
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--sp-8) var(--sp-6);
    overflow: hidden;
  }

  .welcome-banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 90% 20%, rgba(0, 180, 216, 0.12), transparent 60%),
      radial-gradient(ellipse 50% 60% at 10% 80%, rgba(123, 47, 190, 0.10), transparent 60%);
    pointer-events: none;
  }

  .welcome-banner::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--purple), var(--amber));
  }

  .welcome-banner h2 {
    position: relative;
    font-size: 1.75rem;
    margin-bottom: var(--sp-2);
  }

  .welcome-banner h2 span {
    background: linear-gradient(135deg, var(--cyan-glow), var(--purple-glow));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .welcome-banner p {
    position: relative;
    color: var(--ink-dim);
    font-size: 0.95rem;
  }

  .welcome-role {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: var(--sp-2);
    margin-top: var(--sp-3);
    padding: var(--sp-1) var(--sp-3);
    background: rgba(0, 180, 216, 0.08);
    border: 1px solid rgba(0, 180, 216, 0.2);
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .welcome-role::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: statusPulse 2s ease-in-out infinite;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Stat cards */
  .stat-card {
    position: relative;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--sp-5);
    display: flex;
    align-items: flex-start;
    gap: var(--sp-4);
    transition: all var(--transition-fast);
    overflow: hidden;
  }

  .stat-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .stat-card::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity var(--transition-fast);
  }

  .stat-card:hover::after {
    opacity: 1;
  }

  .stat-card--cyan::after { background: var(--cyan); }
  .stat-card--cyan:hover { box-shadow: var(--shadow-glow-cyan); }
  .stat-card--purple::after { background: var(--purple-glow); }
  .stat-card--purple:hover { box-shadow: var(--shadow-glow-purple); }
  .stat-card--amber::after { background: var(--amber); }
  .stat-card--amber:hover { box-shadow: 0 0 20px rgba(244, 185, 66, 0.2); }
  .stat-card--success::after { background: var(--success); }
  .stat-card--success:hover { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }

  .stat-icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .stat-icon--cyan {
    background: rgba(0, 180, 216, 0.12);
    color: var(--cyan);
    box-shadow: inset 0 0 12px rgba(0, 180, 216, 0.08);
  }

  .stat-icon--purple {
    background: rgba(123, 47, 190, 0.12);
    color: var(--purple-glow);
    box-shadow: inset 0 0 12px rgba(123, 47, 190, 0.08);
  }

  .stat-icon--amber {
    background: rgba(244, 185, 66, 0.12);
    color: var(--amber);
    box-shadow: inset 0 0 12px rgba(244, 185, 66, 0.08);
  }

  .stat-icon--success {
    background: rgba(34, 197, 94, 0.12);
    color: var(--success);
    box-shadow: inset 0 0 12px rgba(34, 197, 94, 0.08);
  }

  .stat-info {
    flex: 1;
    min-width: 0;
  }

  .stat-value {
    font-family: var(--font-heading);
    font-size: 1.75rem;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }

  .stat-label {
    font-size: 0.78rem;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: var(--sp-1);
  }

  /* Section headers */
  .section-header {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
    margin-bottom: var(--sp-4);
  }

  .section-header h3 {
    font-size: 1.1rem;
    letter-spacing: 0.04em;
  }

  .section-header::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Activity feed */
  .activity-item {
    display: flex;
    align-items: flex-start;
    gap: var(--sp-3);
    padding: var(--sp-3) 0;
    border-bottom: 1px solid var(--border);
  }

  .activity-item:last-child {
    border-bottom: none;
  }

  .activity-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }

  .activity-dot--cyan { background: var(--cyan); box-shadow: 0 0 6px rgba(0, 180, 216, 0.5); }
  .activity-dot--purple { background: var(--purple-glow); box-shadow: 0 0 6px rgba(168, 85, 247, 0.5); }
  .activity-dot--amber { background: var(--amber); box-shadow: 0 0 6px rgba(244, 185, 66, 0.5); }

  .activity-text {
    flex: 1;
    font-size: 0.875rem;
    color: var(--ink-dim);
    line-height: 1.5;
  }

  .activity-text strong {
    color: var(--ink);
    font-weight: 600;
  }

  .activity-time {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--ink-faint);
    white-space: nowrap;
    margin-top: 2px;
  }

  /* Quick actions */
  .quick-action {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
    padding: var(--sp-4);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    text-decoration: none;
    color: var(--ink);
    transition: all var(--transition-fast);
  }

  .quick-action:hover {
    border-color: var(--border-hover);
    background: var(--surface-3);
    transform: translateX(4px);
    color: var(--ink);
  }

  .quick-action-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .quick-action-icon--cyan {
    background: rgba(0, 180, 216, 0.1);
    color: var(--cyan);
  }

  .quick-action-icon--purple {
    background: rgba(123, 47, 190, 0.1);
    color: var(--purple-glow);
  }

  .quick-action-icon--amber {
    background: rgba(244, 185, 66, 0.1);
    color: var(--amber);
  }

  .quick-action-label {
    font-weight: 600;
    font-size: 0.9rem;
  }

  .quick-action-desc {
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  .quick-action-arrow {
    margin-left: auto;
    color: var(--ink-faint);
    transition: transform var(--transition-fast), color var(--transition-fast);
  }

  .quick-action:hover .quick-action-arrow {
    transform: translateX(4px);
    color: var(--cyan);
  }

  /* Cohort overview */
  .cohort-metric {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--sp-3) 0;
    border-bottom: 1px solid var(--border);
  }

  .cohort-metric:last-child {
    border-bottom: none;
  }

  .cohort-metric-label {
    font-size: 0.85rem;
    color: var(--ink-dim);
  }

  .cohort-metric-value {
    font-family: var(--font-heading);
    font-size: 1rem;
    font-weight: 600;
    color: var(--cyan);
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 3px;
    overflow: hidden;
    margin-top: var(--sp-2);
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-bar-fill--cyan {
    background: linear-gradient(90deg, var(--cyan), var(--cyan-glow));
    box-shadow: 0 0 8px rgba(0, 180, 216, 0.3);
  }

  .progress-bar-fill--purple {
    background: linear-gradient(90deg, var(--purple), var(--purple-glow));
    box-shadow: 0 0 8px rgba(123, 47, 190, 0.3);
  }

  /* Journey card */
  .journey-card {
    background: linear-gradient(135deg, var(--surface-2), var(--surface-3));
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--sp-6);
    position: relative;
    overflow: hidden;
  }

  .journey-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--purple), var(--cyan));
  }

  .journey-status {
    display: inline-flex;
    align-items: center;
    gap: var(--sp-2);
    padding: var(--sp-1) var(--sp-3);
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .journey-status--complete {
    background: rgba(34, 197, 94, 0.12);
    color: var(--success);
  }

  .journey-status--pending {
    background: rgba(244, 185, 66, 0.12);
    color: var(--amber);
  }

  .journey-status--none {
    background: rgba(143, 163, 184, 0.12);
    color: var(--ink-dim);
  }

  /* System overview cards */
  .system-stat {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
    padding: var(--sp-3);
    background: rgba(0, 0, 0, 0.15);
    border-radius: var(--radius-sm);
    margin-bottom: var(--sp-2);
  }

  .system-stat:last-child {
    margin-bottom: 0;
  }

  .system-stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .system-stat-label {
    flex: 1;
    font-size: 0.85rem;
    color: var(--ink-dim);
  }

  .system-stat-value {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--ink);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: var(--sp-8) var(--sp-4);
    color: var(--ink-faint);
  }

  .empty-state-icon {
    font-size: 2rem;
    margin-bottom: var(--sp-3);
    opacity: 0.5;
  }

  .empty-state p {
    font-size: 0.875rem;
    margin-bottom: var(--sp-4);
  }

  /* Geometric accent — subtle diamond grid in banner */
  .geo-accent {
    position: absolute;
    top: -20px;
    right: -20px;
    width: 180px;
    height: 180px;
    opacity: 0.04;
    pointer-events: none;
    background-image:
      linear-gradient(45deg, var(--cyan) 25%, transparent 25%),
      linear-gradient(-45deg, var(--cyan) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--cyan) 75%),
      linear-gradient(-45deg, transparent 75%, var(--cyan) 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    transform: rotate(15deg);
  }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius-sm);
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-text {
    height: 14px;
    margin-bottom: var(--sp-2);
    width: 80%;
  }

  .skeleton-value {
    height: 28px;
    width: 60px;
    margin-bottom: var(--sp-1);
  }
</style>
</head>
<body>

<!-- Dashboard content is injected into #ip-main by renderNav -->

<script type="module">
import { requireAuth, getUser, getRole } from '/shared/auth.js';
import { renderNav } from '/shared/nav.js';
import {
  getSparkSessions,
  getPassports,
  getContacts,
  getOrgs,
  getVendors,
  getInteractions
} from '/shared/store.js';

/* ================================================================
   Boot
   ================================================================ */

async function boot() {
  const user = await requireAuth();
  await renderNav('dashboard');

  const role = await getRole();
  const userName = user?.email?.split('@')[0] || 'Explorer';

  const main = document.getElementById('ip-main');
  main.innerHTML = buildSkeleton();

  // Load all data in parallel
  const [
    sessionsRes,
    passportsRes,
    contactsRes,
    orgsRes,
    vendorsRes,
    interactionsRes
  ] = await Promise.all([
    getSparkSessions(),
    getPassports(),
    getContacts(),
    getOrgs(),
    getVendors(),
    getInteractions()
  ]);

  const sessions     = sessionsRes.data  || [];
  const passports    = passportsRes.data || [];
  const contacts     = contactsRes.data  || [];
  const orgs         = orgsRes.data      || [];
  const vendors      = vendorsRes.data   || [];
  const interactions = interactionsRes.data || [];

  // Build dashboard HTML
  main.innerHTML = buildDashboard({
    user, userName, role,
    sessions, passports, contacts, orgs, vendors, interactions
  });
}

/* ================================================================
   Loading Skeleton
   ================================================================ */

function buildSkeleton() {
  return `
    <div style="display:flex;flex-direction:column;gap:var(--sp-6)">
      <div class="skeleton" style="height:120px;border-radius:var(--radius-lg)"></div>
      <div class="grid grid-4">
        <div class="skeleton" style="height:100px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:100px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:100px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:100px;border-radius:var(--radius-lg)"></div>
      </div>
      <div class="skeleton" style="height:200px;border-radius:var(--radius-lg)"></div>
    </div>`;
}

/* ================================================================
   Dashboard Builder
   ================================================================ */

function buildDashboard(ctx) {
  const { user, userName, role, sessions, passports, contacts, orgs, vendors, interactions } = ctx;

  let html = '';

  // ---- Welcome banner (all roles) ----
  html += `
    <div class="welcome-banner mb-6">
      <div class="geo-accent"></div>
      <h2>Welcome back, <span>${escHtml(userName)}</span></h2>
      <p>Your career discovery and workforce development hub for Eastern Kentucky.</p>
      <div class="welcome-role">${escHtml(role)}</div>
    </div>`;

  // ---- Stat cards (all roles) ----
  html += `
    <div class="grid grid-4 mb-6">
      <div class="stat-card stat-card--cyan">
        <div class="stat-icon stat-icon--cyan">&#10022;</div>
        <div class="stat-info">
          <div class="stat-value">${sessions.length}</div>
          <div class="stat-label">Spark Sessions</div>
        </div>
      </div>
      <div class="stat-card stat-card--purple">
        <div class="stat-icon stat-icon--purple">&#9918;</div>
        <div class="stat-info">
          <div class="stat-value">${passports.length}</div>
          <div class="stat-label">Passports Created</div>
        </div>
      </div>
      <div class="stat-card stat-card--success">
        <div class="stat-icon stat-icon--success">&#9784;</div>
        <div class="stat-info">
          <div class="stat-value">${contacts.length}</div>
          <div class="stat-label">Active Contacts</div>
        </div>
      </div>
      <div class="stat-card stat-card--amber">
        <div class="stat-icon stat-icon--amber">&#8962;</div>
        <div class="stat-info">
          <div class="stat-value">${orgs.length}</div>
          <div class="stat-label">Organizations</div>
        </div>
      </div>
    </div>`;

  // ---- User role: My Journey section ----
  if (role === 'user') {
    html += buildMyJourney(ctx);
  }

  // ---- Facilitator / Admin: Cohort overview + Quick actions ----
  if (role === 'facilitator' || role === 'admin') {
    html += buildFacilitatorSection(ctx);
  }

  // ---- Admin: System overview ----
  if (role === 'admin') {
    html += buildAdminSection(ctx);
  }

  // ---- Recent activity (all roles) ----
  html += buildRecentActivity(ctx);

  return html;
}

/* ================================================================
   My Journey (user role)
   ================================================================ */

function buildMyJourney({ user, sessions, passports }) {
  const userSessions = sessions.filter(s => s.user_id === user?.id);
  const userPassports = passports.filter(p => p.user_id === user?.id);

  const hasSpark = userSessions.length > 0;
  const hasPassport = userPassports.length > 0;

  let sparkSummary = '';
  if (hasSpark) {
    const latest = userSessions[0];
    const archetype = latest.archetype || latest.result_archetype || 'Discovered';
    const code = latest.riasec_code || latest.result_code || '';
    sparkSummary = `
      <div style="margin-top:var(--sp-3)">
        <div style="font-size:0.8rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:var(--sp-2)">Latest Spark Result</div>
        <div style="font-family:var(--font-heading);font-size:1.25rem;color:var(--cyan-glow);margin-bottom:var(--sp-1)">${escHtml(archetype)}</div>
        ${code ? `<div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--purple-glow)">RIASEC: ${escHtml(code)}</div>` : ''}
        <div style="font-size:0.8rem;color:var(--ink-faint);margin-top:var(--sp-2)">Completed ${formatDate(latest.created_at)}</div>
      </div>`;
  }

  return `
    <div class="section-header mt-6">
      <h3>My Journey</h3>
    </div>
    <div class="grid grid-2 mb-6">
      <div class="journey-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3)">
          <h4 style="font-family:var(--font-heading);font-size:0.95rem;letter-spacing:0.03em">Spark Discovery</h4>
          <span class="journey-status ${hasSpark ? 'journey-status--complete' : 'journey-status--none'}">
            ${hasSpark ? 'Completed' : 'Not Started'}
          </span>
        </div>
        <p style="font-size:0.875rem;color:var(--ink-dim)">
          ${hasSpark
            ? `You have completed ${userSessions.length} Spark assessment${userSessions.length > 1 ? 's' : ''}.`
            : 'Discover your career strengths with a quick 6-minute assessment.'}
        </p>
        ${sparkSummary}
        ${!hasSpark ? `
          <a href="/spark/" class="btn btn-primary mt-4">Take Spark Assessment</a>
        ` : `
          <a href="/spark/" class="btn btn-ghost btn-sm mt-4">Retake Assessment</a>
        `}
      </div>
      <div class="journey-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3)">
          <h4 style="font-family:var(--font-heading);font-size:0.95rem;letter-spacing:0.03em">Career Passport</h4>
          <span class="journey-status ${hasPassport ? 'journey-status--complete' : 'journey-status--pending'}">
            ${hasPassport ? 'Created' : 'Pending'}
          </span>
        </div>
        <p style="font-size:0.875rem;color:var(--ink-dim)">
          ${hasPassport
            ? `You have ${userPassports.length} passport${userPassports.length > 1 ? 's' : ''} on file.`
            : 'Build your career passport to showcase your skills and pathway.'}
        </p>
        ${hasPassport ? `
          <a href="/passport/" class="btn btn-ghost btn-sm mt-4">View Passport</a>
        ` : `
          <a href="/passport/" class="btn btn-secondary mt-4">Create Passport</a>
        `}
      </div>
    </div>`;
}

/* ================================================================
   Facilitator Section
   ================================================================ */

function buildFacilitatorSection({ sessions, passports }) {
  const completedSessions = sessions.filter(s => s.completed || s.archetype || s.result_archetype);
  const completionRate = sessions.length > 0
    ? Math.round((completedSessions.length / sessions.length) * 100)
    : 0;

  return `
    <div class="section-header mt-6">
      <h3>Cohort Overview</h3>
    </div>
    <div class="grid grid-2 mb-6">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Session Metrics</span>
          <span class="badge badge-cyan">${sessions.length} total</span>
        </div>
        <div class="card-body">
          <div class="cohort-metric">
            <span class="cohort-metric-label">Active sessions</span>
            <span class="cohort-metric-value">${sessions.length}</span>
          </div>
          <div class="cohort-metric">
            <span class="cohort-metric-label">Completed</span>
            <span class="cohort-metric-value">${completedSessions.length}</span>
          </div>
          <div class="cohort-metric">
            <span class="cohort-metric-label">Completion rate</span>
            <span class="cohort-metric-value">${completionRate}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar-fill progress-bar-fill--cyan" style="width:${completionRate}%"></div>
          </div>
        </div>
      </div>
      <div class="card">

/* ================================================================
   Admin Section
   ================================================================ */

function buildAdminSection({ sessions, passports, contacts, orgs, vendors }) {
  const activeVendors = vendors.filter(v => v.active);

  // Estimate total users from unique user_ids across sessions and passports
  const userIds = new Set();
  sessions.forEach(s => { if (s.user_id) userIds.add(s.user_id); });
  passports.forEach(p => { if (p.user_id) userIds.add(p.user_id); });
  contacts.forEach(c => { if (c.user_id) userIds.add(c.user_id); });
  const totalUsers = userIds.size || 1; // at least the current admin

  return `
    <div class="section-header mt-6">
      <h3>System Overview</h3>
    </div>
    <div class="grid grid-2 mb-6">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Platform Stats</span>
          <span class="badge badge-purple">Admin</span>
        </div>
        <div class="card-body">
          <div class="system-stat">
            <div class="system-stat-dot" style="background:var(--cyan);box-shadow:0 0 6px var(--cyan)"></div>
            <span class="system-stat-label">Total users (est.)</span>
            <span class="system-stat-value">${totalUsers}</span>
          </div>
          <div class="system-stat">
            <div class="system-stat-dot" style="background:var(--success);box-shadow:0 0 6px var(--success)"></div>
            <span class="system-stat-label">Vendors active</span>
            <span class="system-stat-value">${activeVendors.length}</span>
          </div>
          <div class="system-stat">
            <div class="system-stat-dot" style="background:var(--amber);box-shadow:0 0 6px var(--amber)"></div>
            <span class="system-stat-label">Vendors total</span>
            <span class="system-stat-value">${vendors.length}</span>
          </div>
          <div class="system-stat">
            <div class="system-stat-dot" style="background:var(--purple-glow);box-shadow:0 0 6px var(--purple-glow)"></div>
            <span class="system-stat-label">Organizations</span>
            <span class="system-stat-value">${orgs.length}</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Admin Quick Links</span>
        </div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:var(--sp-3)">
          <a href="/vendors/" class="quick-action">
            <div class="quick-action-icon" style="background:rgba(0,180,216,0.1);color:var(--cyan)">&#8962;</div>
            <div>
              <div class="quick-action-label">Vendor Hub</div>
              <div class="quick-action-desc">Manage vendor integrations and status</div>
            </div>
            <span class="quick-action-arrow">&rarr;</span>
          </a>
          <a href="/crm/" class="quick-action">
            <div class="quick-action-icon" style="background:rgba(123,47,190,0.1);color:var(--purple-glow)">&#9776;</div>
            <div>
              <div class="quick-action-label">CRM Management</div>
              <div class="quick-action-desc">Contacts, orgs, and interaction history</div>
            </div>
            <span class="quick-action-arrow">&rarr;</span>
          </a>
        </div>
      </div>
    </div>`;
}

/* ================================================================
   Recent Activity (all roles)
   ================================================================ */

function buildRecentActivity({ sessions, interactions, passports }) {
  // Merge and sort recent items
  const items = [];

  sessions.slice(0, 10).forEach(s => {
    items.push({
      type: 'spark',
      text: `<strong>Spark session</strong> ${s.archetype || s.result_archetype ? 'completed' : 'started'}${s.archetype || s.result_archetype ? ' — ' + escHtml(s.archetype || s.result_archetype) : ''}`,
      date: s.created_at,
      dot: 'cyan'
    });
  });

  interactions.slice(0, 10).forEach(i => {
    items.push({
      type: 'interaction',
      text: `<strong>Interaction</strong> logged${i.type ? ' (' + escHtml(i.type) + ')' : ''}${i.notes ? ' — ' + escHtml(i.notes.substring(0, 60)) : ''}`,
      date: i.created_at,
      dot: 'purple'
    });
  });

  passports.slice(0, 10).forEach(p => {
    items.push({
      type: 'passport',
      text: `<strong>Passport</strong> created${p.share_code ? ' · Code: ' + escHtml(p.share_code) : ''}`,
      date: p.created_at,
      dot: 'amber'
    });
  });

  // Sort by date, most recent first
  items.sort((a, b) => {
    const da = a.date ? new Date(a.date).getTime() : 0;
    const db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });

  const display = items.slice(0, 8);

  let feedHtml = '';
  if (display.length === 0) {
    feedHtml = `
      <div class="empty-state">
        <div class="empty-state-icon">&#9673;</div>
        <p>No recent activity yet. Start a Spark session or add a contact to get going.</p>
        <a href="/spark/" class="btn btn-primary btn-sm">Launch Spark</a>
      </div>`;
  } else {
    feedHtml = display.map(item => `
      <div class="activity-item">
        <div class="activity-dot activity-dot--${item.dot}"></div>
        <div class="activity-text">${item.text}</div>
        <div class="activity-time">${formatDate(item.date)}</div>
      </div>`).join('');
  }

  return `
    <div class="section-header mt-6">
      <h3>Recent Activity</h3>
    </div>
    <div class="card mb-6">
      <div class="card-body">
        ${feedHtml}
      </div>
    </div>`;
}

/* ================================================================
   Utilities
   ================================================================ */

function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    const mins = Math.floor(diff / 60000);
    const hrs  = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);

    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    if (hrs < 24) return `${hrs}h ago`;
    if (days < 7) return `${days}d ago`;

    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch {
    return '';
  }
}

/* ================================================================
   Init
   ================================================================ */

boot().catch(err => {
  console.error('[Dashboard] Boot failed:', err);
});
