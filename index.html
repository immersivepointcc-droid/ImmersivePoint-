<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Imagination Spark XR — ImmersivePoint</title>
  <meta name="description" content="Discover your career DNA through immersive spatial experiences">
  <meta name="theme-color" content="#f0a830">
  <link rel="manifest" href="/manifest.json">

  <!-- A-Frame for WebXR -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- A-Frame Scene (shown in XR mode, hidden in 2D) -->
  <a-scene id="aframe-scene"
           embedded
           vr-mode-ui="enabled: true"
           cursor="rayOrigin: mouse; fuse: true; fuseTimeout: 1500"
           raycaster="objects: .interactive-target">
    <a-entity id="camera-rig" position="0 1.6 2">
      <a-camera look-controls wasd-controls>
        <a-cursor color="#f0a830" fuse="true" fuse-timeout="1500"
                  animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                  animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500; easing: easeInCubic"
                  animation__mouseleave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 150">
          <a-ring radius-inner="0.02" radius-outer="0.035" color="#f0a830" opacity="0.8"></a-ring>
        </a-cursor>
      </a-camera>
    </a-entity>

    <a-entity light="type: ambient; color: #444; intensity: 0.4"></a-entity>

    <a-entity id="scene-content"></a-entity>
  </a-scene>

  <!-- 2D UI Layer -->
  <div id="app-ui"></div>

  <script type="module" src="/js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
