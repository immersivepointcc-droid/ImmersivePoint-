<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmersivePoint — Career Discovery Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    /* --- Background canvas & geometric pattern --- */
    body {
      overflow: hidden;
    }

    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(123, 47, 190, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 70% 50% at 80% 20%, rgba(0, 180, 216, 0.10) 0%, transparent 70%),
        var(--surface-0);
    }

    /* Animated grid lines */
    .login-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 180, 216, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 216, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: grid-drift 20s linear infinite;
    }

    @keyframes grid-drift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* Floating geometric shapes */
    .geo-shape {
      position: absolute;
      border: 1px solid;
      opacity: 0;
      animation: geo-float 12s ease-in-out infinite;
    }

    .geo-shape:nth-child(1) {
      width: 120px; height: 120px;
      top: 10%; left: 8%;
      border-color: rgba(0, 180, 216, 0.15);
      border-radius: 0;
      transform: rotate(45deg);
      animation-delay: 0s;
      animation-duration: 14s;
    }

    .geo-shape:nth-child(2) {
      width: 80px; height: 80px;
      top: 65%; right: 12%;
      border-color: rgba(123, 47, 190, 0.18);
      border-radius: 50%;
      animation-delay: 3s;
      animation-duration: 16s;
    }

    .geo-shape:nth-child(3) {
      width: 60px; height: 60px;
      top: 25%; right: 20%;
      border-color: rgba(244, 185, 66, 0.12);
      border-radius: 0;
      transform: rotate(30deg);
      animation-delay: 6s;
      animation-duration: 18s;
    }

    .geo-shape:nth-child(4) {
      width: 140px; height: 140px;
      bottom: 15%; left: 15%;
      border-color: rgba(0, 180, 216, 0.10);
      border-radius: 50%;
      animation-delay: 2s;
      animation-duration: 20s;
    }

    .geo-shape:nth-child(5) {
      width: 50px; height: 50px;
      top: 50%; left: 50%;
      border-color: rgba(123, 47, 190, 0.14);
      border-radius: 0;
      transform: rotate(60deg);
      animation-delay: 8s;
      animation-duration: 15s;
    }

    @keyframes geo-float {
      0%, 100% { opacity: 0; transform: translateY(20px) rotate(0deg) scale(0.9); }
      20%      { opacity: 1; }
      80%      { opacity: 1; }
      50%      { transform: translateY(-20px) rotate(180deg) scale(1.1); }
    }

    /* Mountain silhouette along bottom */
    .mountains {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      z-index: 1;
    }

    .mountains svg {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    /* --- Login wrapper --- */
    .login-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--sp-6);
      overflow-y: auto;
    }

    /* --- Login card --- */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(10, 20, 32, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 180, 216, 0.12);
      border-radius: var(--radius-xl);
      padding: var(--sp-10) var(--sp-8);
      box-shadow:
        0 0 60px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(0, 180, 216, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      animation: card-enter 0.6s ease-out;
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* --- Brand --- */
    .brand {
      text-align: center;
      margin-bottom: var(--sp-8);
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto var(--sp-4);
      border-radius: 50%;
      background: conic-gradient(var(--cyan), var(--purple), var(--amber), var(--cyan));
      animation: brand-spin 6s linear infinite;
      box-shadow: 0 0 24px rgba(0, 180, 216, 0.3), 0 0 48px rgba(123, 47, 190, 0.15);
    }

    .brand-name {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.35), 0 0 40px rgba(0, 180, 216, 0.15);
    }

    .brand-tagline {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: var(--sp-2);
      line-height: 1.5;
    }

    /* --- Tabs --- */
    .auth-tabs {
      display: flex;
      margin-bottom: var(--sp-6);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .auth-tab {
      flex: 1;
      padding: var(--sp-3) var(--sp-4);
      font-family: var(--font-heading);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      color: var(--ink-faint);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .auth-tab:first-child {
      border-right: 1px solid var(--border);
    }

    .auth-tab:hover {
      color: var(--ink-dim);
      background: rgba(0, 180, 216, 0.04);
    }

    .auth-tab.active {
      color: var(--cyan);
      background: rgba(0, 180, 216, 0.08);
      box-shadow: inset 0 -2px 0 var(--cyan);
    }

    /* --- Forms --- */
    .auth-form {
      display: none;
      flex-direction: column;
      gap: var(--sp-5);
    }

    .auth-form.active {
      display: flex;
    }

    .form-group label {
      font-family: var(--font-heading);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: var(--sp-1);
      display: block;
    }

    .form-group .input,
    .form-group .select {
      background: rgba(6, 12, 22, 0.6);
      border-color: rgba(0, 180, 216, 0.12);
      padding: var(--sp-3) var(--sp-4);
      font-size: 0.9rem;
    }

    .form-group .input:focus,
    .form-group .select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.12), 0 0 16px rgba(0, 180, 216, 0.08);
      background: rgba(6, 12, 22, 0.8);
    }

    .btn-submit {
      width: 100%;
      padding: var(--sp-3) var(--sp-6);
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--cyan), #0090b0);
      color: var(--navy-3);
      border: 1px solid var(--cyan);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--cyan-glow), var(--cyan));
      box-shadow: 0 0 24px rgba(0, 180, 216, 0.35), 0 4px 16px rgba(0, 0, 0, 0.3);
      transform: translateY(-1px);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Shimmer effect on button */
    .btn-submit::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -75%;
      width: 50%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { left: -75%; }
      50%      { left: 125%; }
    }

    /* --- Error display --- */
    .auth-error {
      display: none;
      padding: var(--sp-3) var(--sp-4);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius-md);
      color: #f87171;
      font-size: 0.82rem;
      line-height: 1.5;
      text-align: center;
      animation: error-in 0.3s ease-out;
    }

    .auth-error.visible {
      display: block;
    }

    @keyframes error-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* --- Footer --- */
    .login-footer {
      text-align: center;
      margin-top: var(--sp-6);
      padding-top: var(--sp-4);
      border-top: 1px solid var(--border);
    }

    .login-footer p {
      font-size: 0.72rem;
      color: var(--ink-faint);
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    .login-footer .region-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      margin-top: var(--sp-2);
      padding: var(--sp-1) var(--sp-3);
      background: rgba(244, 185, 66, 0.08);
      border: 1px solid rgba(244, 185, 66, 0.15);
      border-radius: 999px;
      font-size: 0.68rem;
      color: var(--amber);
      font-family: var(--font-mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      .login-card {
        padding: var(--sp-8) var(--sp-6);
        border-radius: var(--radius-lg);
      }

      .brand-name {
        font-size: 1.3rem;
      }
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Background layer -->
  <div class="login-bg">
    <div class="geo-shape"></div>
    <div class="geo-shape"></div>
    <div class="geo-shape"></div>
    <div class="geo-shape"></div>
    <div class="geo-shape"></div>

    <!-- Appalachian mountain silhouette -->
    <div class="mountains">
      <svg viewBox="0 0 1440 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 180 L0 120 L80 95 L160 110 L240 75 L320 90 L400 55 L480 70 L560 40 L640 60 L720 30 L800 50 L880 65 L960 45 L1040 70 L1120 55 L1200 80 L1280 60 L1360 85 L1440 100 L1440 180 Z"
              fill="rgba(6, 12, 22, 0.6)" />
        <path d="M0 180 L0 140 L100 125 L200 135 L300 105 L400 115 L500 90 L600 100 L700 80 L800 95 L900 85 L1000 100 L1100 90 L1200 110 L1300 95 L1440 120 L1440 180 Z"
              fill="rgba(6, 12, 22, 0.85)" />
      </svg>
    </div>
  </div>

  <!-- Login card -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon"></div>
        <div class="brand-name">ImmersivePoint</div>
        <div class="brand-tagline">Career Discovery Platform<br>for Eastern Kentucky</div>
      </div>

      <!-- Error message area -->
      <div class="auth-error" id="authError"></div>

      <!-- Tab toggle -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Sign In form -->
      <form class="auth-form active" id="signinForm">
        <div class="form-group">
          <label for="signin-email">Email</label>
          <input type="email" id="signin-email" class="input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signin-password">Password</label>
          <input type="password" id="signin-password" class="input" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit" id="signinBtn">Sign In</button>
      </form>

      <!-- Sign Up form -->
      <form class="auth-form" id="signupForm">
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" class="input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" class="input" placeholder="Create a password" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label for="signup-role">Role</label>
          <select id="signup-role" class="select" required>
            <option value="user">User</option>
            <option value="facilitator">Facilitator</option>
            <option value="partner">Partner</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="btn-submit" id="signupBtn">Create Account</button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>Workforce Innovation for Appalachia</p>
        <span class="region-badge">&#9670; Eastern Kentucky Region</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { signIn, signUp, getUser } from '/shared/auth.js';

    /* ---- Elements ---- */
    const tabs       = document.querySelectorAll('.auth-tab');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const authError  = document.getElementById('authError');

    /* ---- Check existing session ---- */
    (async () => {
      try {
        const user = await getUser();
        if (user) {
          window.location.href = '/dashboard/';
          return;
        }
      } catch { /* no session */ }
      // Allow body to scroll once we know we're staying on this page
      document.body.style.overflow = '';
    })();

    /* ---- Tab switching ---- */
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        signinForm.classList.toggle('active', target === 'signin');
        signupForm.classList.toggle('active', target === 'signup');
        hideError();
      });
    });

    /* ---- Error handling ---- */
    function showError(msg) {
      authError.textContent = msg;
      authError.classList.add('visible');
    }

    function hideError() {
      authError.textContent = '';
      authError.classList.remove('visible');
    }

    /* ---- Disable / enable button ---- */
    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
    }

    // Store original labels
    document.getElementById('signinBtn').dataset.label = 'Sign In';
    document.getElementById('signupBtn').dataset.label = 'Create Account';

    /* ---- Sign In ---- */
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const btn   = document.getElementById('signinBtn');
      const email = document.getElementById('signin-email').value.trim();
      const pw    = document.getElementById('signin-password').value;

      if (!email || !pw) { showError('Please fill in all fields.'); return; }

      setLoading(btn, true);
      try {
        const { data, error } = await signIn(email, pw);
        if (error) { showError(error.message); setLoading(btn, false); return; }
        window.location.href = '/dashboard/';
      } catch (err) {
        showError('An unexpected error occurred. Please try again.');
        setLoading(btn, false);
      }
    });

    /* ---- Sign Up ---- */
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const btn   = document.getElementById('signupBtn');
      const email = document.getElementById('signup-email').value.trim();
      const pw    = document.getElementById('signup-password').value;
      const role  = document.getElementById('signup-role').value;

      if (!email || !pw) { showError('Please fill in all fields.'); return; }
      if (pw.length < 6)  { showError('Password must be at least 6 characters.'); return; }

      setLoading(btn, true);
      try {
        const { data, error } = await signUp(email, pw, role);
        if (error) { showError(error.message); setLoading(btn, false); return; }
        window.location.href = '/dashboard/';
      } catch (err) {
        showError('An unexpected error occurred. Please try again.');
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
