<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Ops · ImmersivePoint</title>
<link rel="stylesheet" href="/shared/theme.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
/* ===== Mobile Ops Module Styles ===== */

.ops-header {
  margin-bottom: var(--sp-6);
}
.ops-header h2 {
  font-size: 1.5rem;
  background: linear-gradient(135deg, #F59E0B, #D97706);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: var(--sp-1);
}
.ops-subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Tabs */
.ops-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: var(--sp-6);
  overflow-x: auto;
}
.ops-tab {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--ink-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: var(--sp-3) var(--sp-4);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.ops-tab:hover { color: var(--ink); }
.ops-tab.active {
  color: #F59E0B;
  border-bottom-color: #F59E0B;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Summary cards */
.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--sp-3);
  margin-bottom: var(--sp-5);
}
.summary-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--sp-3) var(--sp-4);
  text-align: center;
}
.summary-card-value {
  font-family: 'Orbitron', monospace;
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.2;
}
.summary-card-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.summary-card.ready .summary-card-value { color: var(--green); }
.summary-card.in-use .summary-card-value { color: var(--cyan); }
.summary-card.attention .summary-card-value { color: var(--red); }

/* Status badges */
.badge {
  display: inline-block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  padding: 0.15rem 0.5rem;
  border-radius: 3px;
  text-transform: uppercase;
}
.badge-ready     { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.badge-in-use    { background: rgba(0,180,216,0.15); color: var(--cyan); border: 1px solid rgba(0,180,216,0.3); }
.badge-charging  { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
.badge-maintenance { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.badge-retired   { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
.badge-scheduled { background: rgba(0,180,216,0.15); color: var(--cyan); border: 1px solid rgba(0,180,216,0.3); }
.badge-in-transit { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
.badge-on-site   { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.badge-completed { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
.badge-cancelled { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.badge-open      { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.badge-in-progress { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
.badge-resolved  { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }

/* Filter bar */
.filter-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-bottom: var(--sp-4);
  flex-wrap: wrap;
}
.filter-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  padding: 0.25rem 0.6rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink-dim);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-hover); color: var(--ink); }
.filter-btn.active { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.4); color: #F59E0B; }

/* Data table */
.ops-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
}
.ops-table thead {
  background: var(--surface-2);
}
.ops-table th {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: var(--sp-2) var(--sp-3);
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.ops-table td {
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--ink-dim);
  vertical-align: middle;
}
.ops-table tr:hover td {
  background: rgba(245,158,11,0.03);
}
.ops-table .col-actions {
  white-space: nowrap;
  text-align: right;
}
.ops-table .col-actions button {
  background: none;
  border: none;
  color: var(--ink-faint);
  cursor: pointer;
  font-size: 0.8rem;
  padding: 0.2rem 0.4rem;
  transition: color 0.2s;
}
.ops-table .col-actions button:hover { color: var(--ink); }
.ops-table .col-actions button.del:hover { color: #ef4444; }

.table-wrap {
  overflow-x: auto;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}

.empty-msg {
  text-align: center;
  padding: var(--sp-8);
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
}

/* Toolbar */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--sp-4);
  flex-wrap: wrap;
  gap: var(--sp-2);
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9000;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--sp-6);
  width: 95%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
}
.modal::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #F59E0B, #D97706);
}
.modal h3 {
  font-family: 'Orbitron', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  color: #F59E0B;
  margin-bottom: var(--sp-4);
}
.modal-close {
  position: absolute;
  top: var(--sp-3); right: var(--sp-3);
  background: none; border: none;
  color: var(--muted); font-size: 1.2rem;
  cursor: pointer;
}
.modal-close:hover { color: var(--ink); }

.form-group {
  margin-bottom: var(--sp-3);
}
.form-group label {
  display: block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: var(--sp-1);
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--ink);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.82rem;
  padding: var(--sp-2) var(--sp-3);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: rgba(245,158,11,0.5);
  box-shadow: 0 0 0 2px rgba(245,158,11,0.1);
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); }
.form-actions {
  display: flex; gap: var(--sp-2); justify-content: flex-end; margin-top: var(--sp-4);
}

.btn-amber {
  background: #F59E0B; color: #000; font-weight: 600;
  border: none; padding: var(--sp-2) var(--sp-4);
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem;
  transition: all 0.2s;
}
.btn-amber:hover { background: #D97706; transform: translateY(-1px); }

/* Deployment cards */
.dep-section-label {
  font-family: 'Orbitron', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: var(--sp-3);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--border);
}
.dep-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
  transition: border-color 0.2s;
}
.dep-card:hover { border-color: rgba(245,158,11,0.3); }
.dep-card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: var(--sp-2); gap: var(--sp-2);
}
.dep-card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600; font-size: 0.9rem; color: var(--ink);
}
.dep-card-date {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem; color: #F59E0B;
}
.dep-card-meta {
  display: flex; flex-wrap: wrap; gap: var(--sp-3);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; color: var(--ink-dim);
  margin-bottom: var(--sp-2);
}
.dep-card-meta span::before {
  content: attr(data-label);
  color: var(--muted);
  margin-right: 0.3em;
}
.dep-card-actions {
  display: flex; gap: var(--sp-2); justify-content: flex-end;
}
.dep-card-actions button {
  background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--ink-dim); font-size: 0.7rem; padding: 0.2rem 0.5rem; cursor: pointer;
  transition: all 0.2s;
}
.dep-card-actions button:hover { color: var(--ink); border-color: var(--border-hover); }
.dep-card-actions button.del:hover { color: #ef4444; border-color: rgba(239,68,68,0.4); }

/* Checklist */
.checklist-selector {
  display: flex; align-items: center; gap: var(--sp-3);
  margin-bottom: var(--sp-5);
}
.checklist-selector label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
}
.checklist-selector select {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--ink);
  font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem;
  padding: var(--sp-2) var(--sp-3);
}
.checklist-progress {
  margin-bottom: var(--sp-4);
  display: flex; align-items: center; gap: var(--sp-3);
}
.checklist-progress-bar {
  flex: 1; height: 6px; background: var(--surface-2);
  border-radius: 3px; overflow: hidden;
}
.checklist-progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, #F59E0B, #22c55e);
  transition: width 0.3s;
}
.checklist-progress-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem; color: var(--muted); min-width: 80px;
}
.all-clear {
  text-align: center; padding: var(--sp-4);
  font-family: 'Orbitron', monospace; font-size: 0.85rem;
  color: #22c55e; font-weight: 700;
  display: none;
}
.all-clear.visible { display: block; }

.checklist-group {
  margin-bottom: var(--sp-4);
}
.checklist-group-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.62rem; font-weight: 700;
  color: #F59E0B; letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: var(--sp-2);
}
.checklist-item {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.8rem; color: var(--ink-dim);
}
.checklist-item input[type="checkbox"] {
  accent-color: #F59E0B;
  width: 16px; height: 16px;
}
.checklist-item.checked { color: var(--muted); text-decoration: line-through; }

@media (max-width: 640px) {
  .form-row { grid-template-columns: 1fr; }
  .summary-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<body>

<!-- Modal for devices -->
<div class="modal-overlay" id="device-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('device-modal')">&times;</button>
    <h3 id="device-modal-title">Add Device</h3>
    <input type="hidden" id="dm_id" />
    <div class="form-row">
      <div class="form-group">
        <label>Device Name</label>
        <input type="text" id="dm_name" placeholder="e.g. Quest 3 — Unit 01" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="dm_type">
          <option value="Quest 3">Quest 3</option>
          <option value="Vive Focus 3">Vive Focus 3</option>
          <option value="Laptop">Laptop</option>
          <option value="Router">Router</option>
          <option value="Accessory">Accessory</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Serial Number</label>
        <input type="text" id="dm_serial" placeholder="e.g. SN-20260101-001" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="dm_status">
          <option value="Ready">Ready</option>
          <option value="In Use">In Use</option>
          <option value="Charging">Charging</option>
          <option value="Maintenance">Maintenance</option>
          <option value="Retired">Retired</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Condition</label>
        <select id="dm_condition">
          <option value="Excellent">Excellent</option>
          <option value="Good">Good</option>
          <option value="Fair">Fair</option>
          <option value="Poor">Poor</option>
        </select>
      </div>
      <div class="form-group">
        <label>Last Checked</label>
        <input type="date" id="dm_checked" />
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="dm_notes" rows="2" placeholder="Optional notes..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('device-modal')">Cancel</button>
      <button class="btn-amber" onclick="saveDeviceForm()">Save Device</button>
    </div>
  </div>
</div>

<!-- Modal for deployments -->
<div class="modal-overlay" id="deploy-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('deploy-modal')">&times;</button>
    <h3 id="deploy-modal-title">Add Deployment</h3>
    <input type="hidden" id="dep_id" />
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="dep_date" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="dep_status">
          <option value="Scheduled">Scheduled</option>
          <option value="In Transit">In Transit</option>
          <option value="On Site">On Site</option>
          <option value="Completed">Completed</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Location / Site</label>
        <input type="text" id="dep_location" placeholder="e.g. ACTC Main Campus" />
      </div>
      <div class="form-group">
        <label>Organization</label>
        <input type="text" id="dep_org" placeholder="e.g. Ashland CTC" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Contact Person</label>
        <input type="text" id="dep_contact" placeholder="e.g. Mary Bullard" />
      </div>
      <div class="form-group">
        <label>Headsets Needed</label>
        <input type="number" id="dep_headsets" min="0" value="4" />
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="dep_notes" rows="2" placeholder="Special requirements, setup notes..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('deploy-modal')">Cancel</button>
      <button class="btn-amber" onclick="saveDeployForm()">Save Deployment</button>
    </div>
  </div>
</div>

<!-- Modal for maintenance -->
<div class="modal-overlay" id="maint-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('maint-modal')">&times;</button>
    <h3 id="maint-modal-title">Add Maintenance Entry</h3>
    <input type="hidden" id="mt_id" />
    <div class="form-row">
      <div class="form-group">
        <label>Device</label>
        <select id="mt_device"></select>
      </div>
      <div class="form-group">
        <label>Issue Type</label>
        <select id="mt_type">
          <option value="Hardware">Hardware</option>
          <option value="Software">Software</option>
          <option value="Battery">Battery</option>
          <option value="Lens">Lens</option>
          <option value="Controller">Controller</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="mt_desc" rows="2" placeholder="Describe the issue..."></textarea>
    </div>
    <div class="form-group">
      <label>Resolution</label>
      <textarea id="mt_resolution" rows="2" placeholder="How was it resolved? (leave blank if open)"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Resolved By</label>
        <input type="text" id="mt_resolved_by" placeholder="e.g. Tech name" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="mt_status">
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Resolved">Resolved</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('maint-modal')">Cancel</button>
      <button class="btn-amber" onclick="saveMaintForm()">Save Entry</button>
    </div>
  </div>
</div>

<div id="app"></div>

<script type="module">
import { requireAuth, getRole } from '/shared/auth.js';
import { renderNav } from '/shared/nav.js';
import {
  getDevices, saveDevice, deleteDevice,
  getDeployments, saveDeployment, deleteDeployment,
  getMaintenanceLogs, saveMaintenanceLog, deleteMaintenanceLog,
} from '/shared/store.js';

await requireAuth(['facilitator', 'partner', 'admin']);
await renderNav('mobile-ops');

const CHECKLIST_KEY = 'ip_mobile_checklists';

const CHECKLIST_GROUPS = [
  { name: 'Power', items: ['Extension cords (3)', 'Power strips (2)', 'Surge protectors', 'Headset charging cables', 'Laptop chargers'] },
  { name: 'Network', items: ['Wi-Fi router', 'Ethernet cables (4)', 'Mobile hotspot (backup)', 'Router power adapter'] },
  { name: 'VR Equipment', items: ['Quest 3 headsets', 'Vive Focus 3 headsets', 'Controllers (all pairs)', 'Headset carry cases', 'Lens wipes & cleaning kit', 'Extra batteries (controllers)'] },
  { name: 'Facilitation', items: ['Facilitator laptop', 'Projector / display', 'Portable speakers', 'Printed materials / handouts', 'Sign-in sheet', 'ImmersivePoint stickers / swag'] },
];

/* ── State ──────────────────────────────────── */
let activeTab = 'inventory';
let deviceFilter = 'All';
let maintFilter = 'All';
let selectedDeployId = null;

/* ── Boot ───────────────────────────────────── */
document.getElementById('app').innerHTML = `
  <div class="ops-header">
    <h2>Mobile Operations</h2>
    <span class="ops-subtitle">Hardware &middot; Deployments &middot; Inventory</span>
  </div>

  <div class="ops-tabs" id="ops-tabs">
    <button class="ops-tab active" data-tab="inventory">Hardware Inventory</button>
    <button class="ops-tab" data-tab="deployments">Deployment Schedule</button>
    <button class="ops-tab" data-tab="checklist">Kit Checklist</button>
    <button class="ops-tab" data-tab="maintenance">Maintenance Log</button>
  </div>

  <div class="tab-panel active" id="panel-inventory"></div>
  <div class="tab-panel" id="panel-deployments"></div>
  <div class="tab-panel" id="panel-checklist"></div>
  <div class="tab-panel" id="panel-maintenance"></div>
`;

document.getElementById('ops-tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.ops-tab');
  if (!btn) return;
  activeTab = btn.dataset.tab;
  document.querySelectorAll('.ops-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${activeTab}`));
  render();
});

/* ── Helpers ────────────────────────────────── */
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function badgeClass(status) {
  return 'badge badge-' + (status || '').toLowerCase().replace(/\s+/g, '-');
}

function todayStr() { return new Date().toISOString().slice(0, 10); }

/* ── Render ─────────────────────────────────── */
function render() {
  if (activeTab === 'inventory') renderInventory();
  else if (activeTab === 'deployments') renderDeployments();
  else if (activeTab === 'checklist') renderChecklist();
  else if (activeTab === 'maintenance') renderMaintenance();
}

/* ── INVENTORY ──────────────────────────────── */
function renderInventory() {
  const devices = getDevices();
  const filtered = deviceFilter === 'All' ? devices : devices.filter(d => d.status === deviceFilter);

  const ready = devices.filter(d => d.status === 'Ready').length;
  const inUse = devices.filter(d => d.status === 'In Use').length;
  const needsAttn = devices.filter(d => d.status === 'Maintenance' || d.condition === 'Poor').length;

  const statuses = ['All', 'Ready', 'In Use', 'Charging', 'Maintenance', 'Retired'];

  let html = `
    <div class="summary-row">
      <div class="summary-card"><div class="summary-card-value">${devices.length}</div><div class="summary-card-label">Total Devices</div></div>
      <div class="summary-card ready"><div class="summary-card-value">${ready}</div><div class="summary-card-label">Ready</div></div>
      <div class="summary-card in-use"><div class="summary-card-value">${inUse}</div><div class="summary-card-label">In Use</div></div>
      <div class="summary-card attention"><div class="summary-card-value">${needsAttn}</div><div class="summary-card-label">Needs Attention</div></div>
    </div>
    <div class="toolbar">
      <div class="filter-bar">
        ${statuses.map(s => `<button class="filter-btn${s === deviceFilter ? ' active' : ''}" data-filter="${s}">${s}</button>`).join('')}
      </div>
      <button class="btn-amber" onclick="window._openDeviceModal()">+ Add Device</button>
    </div>
  `;

  if (filtered.length === 0) {
    html += '<div class="empty-msg">No devices found. Add your first device to get started.</div>';
  } else {
    html += `<div class="table-wrap"><table class="ops-table">
      <thead><tr>
        <th>Name</th><th>Type</th><th>Serial</th><th>Status</th><th>Condition</th><th>Last Checked</th><th>Notes</th><th></th>
      </tr></thead><tbody>`;
    for (const d of filtered) {
      html += `<tr>
        <td style="font-weight:500;color:var(--ink)">${esc(d.name)}</td>
        <td>${esc(d.type)}</td>
        <td style="font-family:'Share Tech Mono',monospace;font-size:0.72rem">${esc(d.serial)}</td>
        <td><span class="${badgeClass(d.status)}">${esc(d.status)}</span></td>
        <td>${esc(d.condition)}</td>
        <td style="font-family:'Share Tech Mono',monospace;font-size:0.72rem">${esc(d.last_checked)}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(d.notes)}">${esc(d.notes)}</td>
        <td class="col-actions">
          <button onclick="window._editDevice('${d.id}')" title="Edit">&#9998;</button>
          <button class="del" onclick="window._deleteDevice('${d.id}')" title="Delete">&#10005;</button>
        </td>
      </tr>`;
    }
    html += '</tbody></table></div>';
  }

  document.getElementById('panel-inventory').innerHTML = html;

  document.querySelectorAll('#panel-inventory .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => { deviceFilter = btn.dataset.filter; renderInventory(); });
  });
}

/* ── DEPLOYMENTS ────────────────────────────── */
function renderDeployments() {
  const deps = getDeployments();
  const today = todayStr();
  const upcoming = deps.filter(d => d.date >= today && d.status !== 'Completed' && d.status !== 'Cancelled')
    .sort((a, b) => a.date.localeCompare(b.date));
  const past = deps.filter(d => d.date < today || d.status === 'Completed' || d.status === 'Cancelled')
    .sort((a, b) => b.date.localeCompare(a.date));

  let html = `
    <div class="toolbar">
      <div></div>
      <button class="btn-amber" onclick="window._openDeployModal()">+ Add Deployment</button>
    </div>
  `;

  if (upcoming.length > 0) {
    html += '<div class="dep-section-label">Upcoming & Active</div>';
    for (const d of upcoming) html += deployCard(d);
  }
  if (past.length > 0) {
    html += '<div class="dep-section-label" style="margin-top:var(--sp-5)">Past</div>';
    for (const d of past) html += deployCard(d);
  }
  if (deps.length === 0) {
    html += '<div class="empty-msg">No deployments scheduled. Plan your first deployment to get started.</div>';
  }

  document.getElementById('panel-deployments').innerHTML = html;
}

function deployCard(d) {
  const dateObj = new Date(d.date + 'T12:00:00');
  const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  return `<div class="dep-card">
    <div class="dep-card-header">
      <div>
        <div class="dep-card-title">${esc(d.location)}</div>
        <div class="dep-card-date">${dateStr}</div>
      </div>
      <span class="${badgeClass(d.status)}">${esc(d.status)}</span>
    </div>
    <div class="dep-card-meta">
      <span data-label="Org:">${esc(d.organization)}</span>
      <span data-label="Contact:">${esc(d.contact_person)}</span>
      <span data-label="Headsets:">${d.headsets_needed || 0}</span>
    </div>
    ${d.notes ? `<div style="font-size:0.72rem;color:var(--muted);margin-bottom:var(--sp-2)">${esc(d.notes)}</div>` : ''}
    <div class="dep-card-actions">
      <button onclick="window._editDeploy('${d.id}')">Edit</button>
      <button class="del" onclick="window._deleteDeploy('${d.id}')">Delete</button>
    </div>
  </div>`;
}

/* ── CHECKLIST ──────────────────────────────── */
function renderChecklist() {
  const deps = getDeployments().filter(d => d.status !== 'Cancelled');
  const checklists = getChecklists();

  let html = `<div class="checklist-selector">
    <label>Deployment:</label>
    <select id="checklist-deploy-select">
      <option value="">— Select a deployment —</option>
      ${deps.map(d => `<option value="${d.id}"${d.id === selectedDeployId ? ' selected' : ''}>${esc(d.location)} (${d.date})</option>`).join('')}
    </select>
  </div>`;

  if (!selectedDeployId) {
    html += '<div class="empty-msg">Select a deployment above to load its checklist.</div>';
  } else {
    const state = checklists[selectedDeployId] || {};
    const allItems = CHECKLIST_GROUPS.flatMap(g => g.items);
    const checked = allItems.filter(i => state[i]).length;
    const total = allItems.length;
    const pct = total > 0 ? Math.round(checked / total * 100) : 0;
    const allClear = checked === total && total > 0;

    html += `<div class="checklist-progress">
      <div class="checklist-progress-bar"><div class="checklist-progress-fill" style="width:${pct}%"></div></div>
      <div class="checklist-progress-text">${checked}/${total} (${pct}%)</div>
    </div>
    <div class="all-clear${allClear ? ' visible' : ''}">ALL CLEAR — Kit is ready for deployment</div>`;

    for (const group of CHECKLIST_GROUPS) {
      html += `<div class="checklist-group">
        <div class="checklist-group-title">${esc(group.name)}</div>`;
      for (const item of group.items) {
        const isChecked = state[item] || false;
        html += `<div class="checklist-item${isChecked ? ' checked' : ''}">
          <input type="checkbox" data-item="${esc(item)}" ${isChecked ? 'checked' : ''} />
          <span>${esc(item)}</span>
        </div>`;
      }
      html += '</div>';
    }
  }

  document.getElementById('panel-checklist').innerHTML = html;

  document.getElementById('checklist-deploy-select')?.addEventListener('change', (e) => {
    selectedDeployId = e.target.value || null;
    renderChecklist();
  });

  document.querySelectorAll('#panel-checklist input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      const item = cb.dataset.item;
      const checklists = getChecklists();
      if (!checklists[selectedDeployId]) checklists[selectedDeployId] = {};
      checklists[selectedDeployId][item] = cb.checked;
      localStorage.setItem(CHECKLIST_KEY, JSON.stringify(checklists));
      renderChecklist();
    });
  });
}

function getChecklists() {
  try { return JSON.parse(localStorage.getItem(CHECKLIST_KEY) || '{}'); } catch { return {}; }
}

/* ── MAINTENANCE ────────────────────────────── */
function renderMaintenance() {
  const logs = getMaintenanceLogs();
  const devices = getDevices();
  const filtered = maintFilter === 'All' ? logs : logs.filter(l => l.status === maintFilter);

  const statuses = ['All', 'Open', 'In Progress', 'Resolved'];

  let html = `
    <div class="toolbar">
      <div class="filter-bar">
        ${statuses.map(s => `<button class="filter-btn${s === maintFilter ? ' active' : ''}" data-mfilter="${s}">${s}</button>`).join('')}
      </div>
      <button class="btn-amber" onclick="window._openMaintModal()">+ Add Entry</button>
    </div>
  `;

  if (filtered.length === 0) {
    html += '<div class="empty-msg">No maintenance entries found.</div>';
  } else {
    html += `<div class="table-wrap"><table class="ops-table">
      <thead><tr>
        <th>Date</th><th>Device</th><th>Issue</th><th>Description</th><th>Status</th><th>Resolved By</th><th></th>
      </tr></thead><tbody>`;
    for (const l of filtered) {
      const dev = devices.find(d => d.id === l.device_id);
      const date = l.created_at ? new Date(l.created_at).toLocaleDateString() : '';
      html += `<tr>
        <td style="font-family:'Share Tech Mono',monospace;font-size:0.72rem">${date}</td>
        <td style="font-weight:500;color:var(--ink)">${esc(dev?.name || l.device_name || '—')}</td>
        <td>${esc(l.issue_type)}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(l.description)}">${esc(l.description)}</td>
        <td><span class="${badgeClass(l.status)}">${esc(l.status)}</span></td>
        <td>${esc(l.resolved_by)}</td>
        <td class="col-actions">
          <button onclick="window._editMaint('${l.id}')" title="Edit">&#9998;</button>
          <button class="del" onclick="window._deleteMaint('${l.id}')" title="Delete">&#10005;</button>
        </td>
      </tr>`;
    }
    html += '</tbody></table></div>';
  }

  document.getElementById('panel-maintenance').innerHTML = html;

  document.querySelectorAll('#panel-maintenance .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => { maintFilter = btn.dataset.mfilter; renderMaintenance(); });
  });
}

/* ── MODAL HELPERS ──────────────────────────── */
window.closeModal = (id) => document.getElementById(id)?.classList.remove('open');

window._openDeviceModal = (device) => {
  document.getElementById('device-modal-title').textContent = device ? 'Edit Device' : 'Add Device';
  document.getElementById('dm_id').value = device?.id || '';
  document.getElementById('dm_name').value = device?.name || '';
  document.getElementById('dm_type').value = device?.type || 'Quest 3';
  document.getElementById('dm_serial').value = device?.serial || '';
  document.getElementById('dm_status').value = device?.status || 'Ready';
  document.getElementById('dm_condition').value = device?.condition || 'Good';
  document.getElementById('dm_checked').value = device?.last_checked || todayStr();
  document.getElementById('dm_notes').value = device?.notes || '';
  document.getElementById('device-modal').classList.add('open');
};

window._editDevice = (id) => {
  const d = getDevices().find(x => x.id === id);
  if (d) window._openDeviceModal(d);
};

window._deleteDevice = (id) => {
  if (confirm('Delete this device?')) { deleteDevice(id); renderInventory(); }
};

window.saveDeviceForm = () => {
  const device = {
    id: document.getElementById('dm_id').value || undefined,
    name: document.getElementById('dm_name').value.trim(),
    type: document.getElementById('dm_type').value,
    serial: document.getElementById('dm_serial').value.trim(),
    status: document.getElementById('dm_status').value,
    condition: document.getElementById('dm_condition').value,
    last_checked: document.getElementById('dm_checked').value,
    notes: document.getElementById('dm_notes').value.trim(),
  };
  if (!device.name) return alert('Device name is required.');
  saveDevice(device);
  closeModal('device-modal');
  renderInventory();
};

window._openDeployModal = (dep) => {
  document.getElementById('deploy-modal-title').textContent = dep ? 'Edit Deployment' : 'Add Deployment';
  document.getElementById('dep_id').value = dep?.id || '';
  document.getElementById('dep_date').value = dep?.date || todayStr();
  document.getElementById('dep_location').value = dep?.location || '';
  document.getElementById('dep_org').value = dep?.organization || '';
  document.getElementById('dep_contact').value = dep?.contact_person || '';
  document.getElementById('dep_headsets').value = dep?.headsets_needed ?? 4;
  document.getElementById('dep_status').value = dep?.status || 'Scheduled';
  document.getElementById('dep_notes').value = dep?.notes || '';
  document.getElementById('deploy-modal').classList.add('open');
};

window._editDeploy = (id) => {
  const d = getDeployments().find(x => x.id === id);
  if (d) window._openDeployModal(d);
};

window._deleteDeploy = (id) => {
  if (confirm('Delete this deployment?')) { deleteDeployment(id); renderDeployments(); }
};

window.saveDeployForm = () => {
  const dep = {
    id: document.getElementById('dep_id').value || undefined,
    date: document.getElementById('dep_date').value,
    location: document.getElementById('dep_location').value.trim(),
    organization: document.getElementById('dep_org').value.trim(),
    contact_person: document.getElementById('dep_contact').value.trim(),
    headsets_needed: parseInt(document.getElementById('dep_headsets').value) || 0,
    status: document.getElementById('dep_status').value,
    notes: document.getElementById('dep_notes').value.trim(),
  };
  if (!dep.location) return alert('Location is required.');
  saveDeployment(dep);
  closeModal('deploy-modal');
  renderDeployments();
};

window._openMaintModal = (entry) => {
  document.getElementById('maint-modal-title').textContent = entry ? 'Edit Maintenance Entry' : 'Add Maintenance Entry';
  const devices = getDevices();
  const sel = document.getElementById('mt_device');
  sel.innerHTML = '<option value="">— Select device —</option>' +
    devices.map(d => `<option value="${d.id}"${entry?.device_id === d.id ? ' selected' : ''}>${esc(d.name)}</option>`).join('');
  document.getElementById('mt_id').value = entry?.id || '';
  document.getElementById('mt_type').value = entry?.issue_type || 'Hardware';
  document.getElementById('mt_desc').value = entry?.description || '';
  document.getElementById('mt_resolution').value = entry?.resolution || '';
  document.getElementById('mt_resolved_by').value = entry?.resolved_by || '';
  document.getElementById('mt_status').value = entry?.status || 'Open';
  document.getElementById('maint-modal').classList.add('open');
};

window._editMaint = (id) => {
  const m = getMaintenanceLogs().find(x => x.id === id);
  if (m) window._openMaintModal(m);
};

window._deleteMaint = (id) => {
  if (confirm('Delete this maintenance entry?')) { deleteMaintenanceLog(id); renderMaintenance(); }
};

window.saveMaintForm = () => {
  const devices = getDevices();
  const deviceId = document.getElementById('mt_device').value;
  const device = devices.find(d => d.id === deviceId);
  const entry = {
    id: document.getElementById('mt_id').value || undefined,
    device_id: deviceId,
    device_name: device?.name || '',
    issue_type: document.getElementById('mt_type').value,
    description: document.getElementById('mt_desc').value.trim(),
    resolution: document.getElementById('mt_resolution').value.trim(),
    resolved_by: document.getElementById('mt_resolved_by').value.trim(),
    status: document.getElementById('mt_status').value,
  };
  if (!entry.description) return alert('Description is required.');
  saveMaintenanceLog(entry);
  closeModal('maint-modal');
  renderMaintenance();
};

// Close modals on backdrop click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// Initial render
render();
</script>
</body>
</html>
