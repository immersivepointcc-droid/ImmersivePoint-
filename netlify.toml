# ============================================================
# ImmersivePoint — Netlify Configuration
# ============================================================

[build]
  publish = "/"
  # No build command needed — static frontend served directly.
  # If a build step is added later, set it here.
  # command = "npm run build"

# ---- SPA-style redirects for each module -------------------
# Each module folder gets its own fallback so client-side routing works.

[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/spark/*"
  to = "/spark/index.html"
  status = 200

[[redirects]]
  from = "/passport/*"
  to = "/passport/index.html"
  status = 200

[[redirects]]
  from = "/crm/*"
  to = "/crm/index.html"
  status = 200

[[redirects]]
  from = "/vendors/*"
  to = "/vendors/index.html"
  status = 200

# Public passport share links — /p/<share_code>
[[redirects]]
  from = "/p/*"
  to = "/passport/index.html"
  status = 200

# Root fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---- Security Headers -------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https://*.supabase.co https://*.modal.run;
      frame-ancestors 'none';
    """

# Cache static assets aggressively
[[headers]]
  for = "/shared/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400"
